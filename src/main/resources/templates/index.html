<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="context-path" th:content="@{/}">
  <title>건담 메뉴얼</title>
  <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
  <script th:src="@{/vendor/tailwind/tailwind.min.js}"></script>
  <script th:src="@{/vendor/pdfjs/pdf.min.js}"></script>
  <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="page-viewer flex bg-gray-900">

<!-- ── 왼쪽 사이드바 ── -->
<aside id="sidebar" aria-labelledby="왼쪽 사이드바"
  class="flex-shrink-0 bg-gray-900 text-white flex flex-col"
  style="width:220px;">

  <!-- 헤더 -->
  <div id="sb-header" class="flex items-center gap-2 px-2 bg-gray-800 border-b border-gray-700 flex-shrink-0" style="height:48px;">
    <button id="sb-toggle"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      title="접기">
      <i id="sb-toggle-icon" class="fas fa-angles-left text-sm"></i>
    </button>
    <span id="sb-title" class="font-bold text-sm whitespace-nowrap flex-1">건담 메뉴얼</span>
    <button id="sb-refresh"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      title="새로고침">
      <i class="fas fa-rotate-right text-xs"></i>
    </button>
  </div>

  <!-- 펼쳤을 때: 검색 + 전체 목록 -->
  <div id="sb-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- 검색 -->
    <div class="px-2 py-1.5 border-b border-gray-700 flex-shrink-0">
      <div class="flex items-center gap-1 bg-gray-700 rounded px-2 py-1">
        <i class="fas fa-magnifying-glass text-gray-500 text-xs"></i>
        <input id="manual-search" type="text" placeholder="등급 또는 제품명 검색…" autocomplete="off" aria-label="메뉴얼 검색"
          class="flex-1 bg-transparent text-xs outline-none text-gray-300 placeholder-gray-500">
      </div>
    </div>
    <div id="manual-list" class="flex-1 overflow-y-auto p-1.5">
      <p class="text-gray-500 text-xs p-2">불러오는 중…</p>
    </div>
  </div>

  <!-- 접었을 때: 아이콘 목록 -->
  <div id="sb-icons" class="flex-1 flex-col items-center gap-0.5 py-1.5 overflow-y-auto" style="display:none;">
  </div>

  <!-- GitHub 링크 (펼침) -->
  <div id="sb-github" class="flex-shrink-0 border-t border-gray-700 px-2 py-2">
    <a href="https://github.com/antop-dev/gunpla-decal" target="_blank" rel="noopener"
       class="flex items-center gap-2 text-gray-400 hover:text-white text-xs rounded px-1 py-1 hover:bg-gray-700">
      <i class="fab fa-github text-sm flex-shrink-0"></i>
      <span>GitHub</span>
    </a>
  </div>
  <!-- GitHub 링크 (접힘) -->
  <div id="sb-github-icon" class="flex-shrink-0 border-t border-gray-700 flex items-center justify-center py-2" style="display:none;">
    <a href="https://github.com/antop-dev/gunpla-decal" target="_blank" rel="noopener"
       class="w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
       title="GitHub">
      <i class="fab fa-github text-sm"></i>
    </a>
  </div>
</aside>

<!-- ── 메인 ── -->
<div class="flex-1 flex flex-col min-w-0 bg-gray-100">

  <!-- 썸네일 스트립 -->
  <div id="thumb-strip" class="flex-shrink-0 bg-gray-800 overflow-x-auto" style="height:90px;">
    <div class="strip-inner">
      <span class="text-gray-500 text-xs select-none">메뉴얼을 선택하세요</span>
    </div>
  </div>

  <!-- PDF + 오른쪽 사이드바 -->
  <div class="flex-1 flex min-h-0">

    <!-- PDF 뷰어 -->
    <div id="pdf-container" class="flex-1 relative overflow-hidden bg-gray-500">
      <div id="no-pdf" class="absolute inset-0 flex items-center justify-center text-gray-300 select-none">
        <div class="text-center">
          <i class="fas fa-file-pdf text-5xl mb-3 opacity-40"></i>
          <p class="text-sm">좌측에서 메뉴얼을 선택하세요</p>
        </div>
      </div>
      <div id="pdf-loading"><div id="pdf-loading-page"></div></div>
      <div id="pdf-scroll" style="display:none;">
        <div id="pdf-sizer">
          <canvas id="pdf-canvas"></canvas>
          <div id="decal-overlay"></div>
        </div>
      </div>
      <div id="zoom-overlay">
        <span id="zoom-label"></span>
        <div class="zoom-divider"></div>
        <input id="zoom-slider" type="range" min="50" max="500" step="1" value="100" aria-label="확대/축소">
        <button id="fit-width-btn" title="가로 맞춤">↔︎</button>
        <button id="fit-height-btn" title="세로 맞춤">↕︎</button>
        <div class="zoom-divider"></div>
        <label id="marker-toggle" title="마커 보이기/숨기기">
          <input type="checkbox" id="marker-visible" checked>
          <i class="fas fa-location-dot"></i>
          <span>마커</span>
        </label>
      </div>
    </div>

    <!-- ── 오른쪽 사이드바 ── -->
    <aside id="right-sidebar" aria-labelledby="오른쪽 사이드바"
      class="flex-shrink-0 bg-white flex flex-col"
      style="width:210px; display:none;">

      <!-- 헤더 -->
      <div id="rs-header" class="flex items-center gap-2 px-2 border-b border-gray-200 bg-gray-50 flex-shrink-0" style="height:40px;">
        <button id="rs-toggle"
          class="flex-shrink-0 w-7 h-7 flex items-center justify-center rounded hover:bg-gray-200 text-gray-500 hover:text-gray-800"
          title="접기">
          <i id="rs-toggle-icon" class="fas fa-angles-right text-xs"></i>
        </button>
        <span id="rs-title" class="text-xs font-semibold text-gray-700 whitespace-nowrap flex-1">데칼 목록</span>
      </div>

      <!-- 펼쳤을 때: 검색 + 그리드 -->
      <div id="rs-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
        <!-- 검색 -->
        <div class="px-2 py-1.5 border-b border-gray-100 flex-shrink-0">
          <div class="flex items-center gap-1 bg-gray-100 rounded px-2 py-1">
            <i class="fas fa-magnifying-glass text-gray-400 text-xs"></i>
            <input id="decal-search" type="text" placeholder="검색…" autocomplete="off" aria-label="데칼 검색"
              class="flex-1 bg-transparent text-xs outline-none text-gray-700 placeholder-gray-400">
          </div>
        </div>
        <!-- 데칼 그리드 (5열) -->
        <div id="decal-list" class="flex-1 overflow-y-auto p-1.5">
          <span class="text-xs text-gray-400 p-1 block">메뉴얼을 선택하세요</span>
        </div>
      </div>

      <!-- 접었을 때: 1열 아이콘 목록 -->
      <div id="rs-icons" class="flex-1 flex-col items-center gap-0.5 py-1.5 overflow-y-auto" style="display:none;">
      </div>
    </aside>

  </div>
</div>

<div id="manual-item-tip"></div>
<script th:src="@{/vendor/pretty-scroll/pretty-scroll.js}"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
