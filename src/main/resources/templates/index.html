<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="context-path" th:content="@{/}">
  <title th:text="${manual != null} ? (${manual.productName} + ' | ' + #{site.title}) : #{site.title}">Gundam Manual</title>
  <meta name="description" th:content="${manual != null} ? (${manual.grade + ' ' + manual.modelNumber + ' ' + manual.productName} + ' ' + #{site.desc.suffix}) : #{site.desc.list}">
  <meta property="og:type" content="website">
  <meta property="og:title" th:content="${manual != null} ? (${manual.productName} + ' | ' + #{site.title}) : #{site.title}">
  <meta property="og:description" th:content="${manual != null} ? (${manual.grade + ' ' + manual.modelNumber + ' ' + manual.productName} + ' ' + #{site.desc.suffix}) : #{site.desc.list}">
  <meta property="og:url" th:content="${manual != null} ? ${baseUrl + '/' + manual.id} : ${baseUrl}">
  <script id="json-ld" type="application/ld+json" th:utext="${jsonLd}"></script>
  <link rel="alternate" type="application/rss+xml" title="RSS Feed" th:href="${baseUrl + '/rss.xml'}">
  <link rel="alternate" type="application/atom+xml" title="Atom Feed" th:href="${baseUrl + '/atom.xml'}">
  <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
  <script th:src="@{/vendor/tailwind/tailwind.min.js}"></script>
  <script th:src="@{/vendor/pdfjs/pdf.min.js}"></script>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <th:block th:if="${not #strings.isEmpty(ga4)}">
    <script th:src="@{https://www.googletagmanager.com/gtag/js(id=${ga4})}" async="async"></script>
    <script th:inline="javascript">
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', /*[[${ga4}]]*/ '');
    </script>
  </th:block>
</head>
<body class="page-viewer flex bg-gray-900">

<!-- ── 왼쪽 사이드바 ── -->
<aside id="sidebar" aria-labelledby="왼쪽 사이드바"
  class="flex-shrink-0 bg-gray-900 text-white flex flex-col"
  style="width:220px;">

  <!-- 헤더 -->
  <div id="sb-header" class="flex items-center gap-2 px-2 bg-gray-800 border-b border-gray-700 flex-shrink-0" style="height:48px;">
    <button id="sb-toggle"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      th:title="#{sidebar.collapse}">
      <i id="sb-toggle-icon" class="fas fa-angles-left text-sm"></i>
    </button>
    <span id="sb-title" class="font-bold text-sm whitespace-nowrap flex-1" th:text="#{site.title}">Gundam Manual</span>
    <button id="sb-refresh"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      th:title="#{sidebar.refresh}">
      <i class="fas fa-rotate-right text-xs"></i>
    </button>
  </div>

  <!-- 펼쳤을 때: 검색 + 전체 목록 -->
  <div id="sb-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- 검색 -->
    <div class="px-2 py-1.5 border-b border-gray-500 flex-shrink-0">
      <div class="flex items-center gap-1 bg-gray-700 rounded px-2 py-1">
        <i class="fas fa-magnifying-glass text-gray-500 text-xs"></i>
        <input id="manual-search" type="text" th:placeholder="#{manual.search.placeholder}" autocomplete="off" th:attr="aria-label=#{manual.search.aria}"
          class="flex-1 bg-transparent text-xs outline-none text-gray-300 placeholder-gray-500">
      </div>
    </div>
    <div id="manual-list" class="flex-1 overflow-y-auto p-1.5">
      <p class="text-gray-500 text-xs p-2" th:text="#{manual.loading}">Loading…</p>
    </div>
  </div>

  <!-- 접었을 때: 아이콘 목록 -->
  <div id="sb-icons" class="flex-1 flex-col items-center gap-0.5 py-1.5 overflow-y-auto" style="display:none;">
  </div>

  <!-- GitHub + 이메일 링크 (펼침) -->
  <div id="sb-github" class="flex-shrink-0 border-t border-gray-500 px-2 py-2 flex justify-evenly">
    <a href="https://github.com/antop-dev/gunpla-decal" target="_blank" rel="noopener"
       class="flex items-center gap-2 text-gray-400 hover:text-white text-xs rounded px-1 py-1 hover:bg-gray-700">
      <i class="fab fa-github text-sm flex-shrink-0"></i>
      <span>GitHub</span>
    </a>
    <a href="mailto:antop@kakao.com"
       class="flex items-center gap-2 text-gray-400 hover:text-white text-xs rounded px-1 py-1 hover:bg-gray-700">
      <i class="fas fa-envelope text-sm flex-shrink-0"></i>
      <span th:text="#{contact.email}">Email</span>
    </a>
  </div>
  <!-- GitHub + 이메일 링크 (접힘) -->
  <div id="sb-github-icon" class="flex-shrink-0 border-t border-gray-500 flex flex-col items-center gap-0.5 py-2" style="display:none;">
    <a href="https://github.com/antop-dev/gunpla-decal" target="_blank" rel="noopener"
       class="w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
       title="GitHub">
      <i class="fab fa-github text-sm"></i>
    </a>
    <a href="mailto:antop@kakao.com"
       class="w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
       title="antop@kakao.com">
      <i class="fas fa-envelope text-sm"></i>
    </a>
  </div>
</aside>

<!-- ── 메인 ── -->
<div class="flex-1 flex flex-col min-w-0 bg-gray-100">

  <!-- 썸네일 스트립 -->
  <div id="thumb-strip" class="flex-shrink-0 bg-gray-800 overflow-x-auto" style="height:85px; border-bottom:1px solid #6b7280;">
    <div class="strip-inner">
      <span class="text-gray-500 text-xs select-none" th:text="#{manual.select}">Select a manual</span>
    </div>
  </div>

  <!-- PDF + 오른쪽 사이드바 -->
  <div class="flex-1 flex min-h-0">

    <!-- PDF 뷰어 -->
    <div id="pdf-container" class="flex-1 relative overflow-hidden bg-gray-700">
      <div id="no-pdf" class="absolute inset-0 flex items-center justify-center text-gray-300 select-none">
        <div class="text-center">
          <i class="fas fa-file-pdf text-5xl mb-3 opacity-40"></i>
          <p class="text-sm" th:text="#{pdf.select}">Select a manual from the left</p>
        </div>
      </div>
      <div id="pdf-loading"><div id="pdf-loading-page"></div></div>
      <div id="pdf-scroll" style="display:none;">
        <div id="pdf-sizer">
          <canvas id="pdf-canvas"></canvas>
          <div id="decal-overlay"></div>
        </div>
      </div>
      <div id="zoom-overlay">
        <span id="zoom-label"></span>
        <input id="zoom-slider" type="range" min="50" max="500" step="1" value="100" th:attr="aria-label=#{zoom.aria}">
        <button id="fit-width-btn" th:title="#{zoom.fitWidth}">↔︎ <span th:text="#{zoom.fitWidth.label}">가로</span></button>
        <button id="fit-height-btn" th:title="#{zoom.fitHeight}">↕︎ <span th:text="#{zoom.fitHeight.label}">세로</span></button>
        <div class="zoom-divider"></div>
        <label id="marker-toggle" th:title="#{marker.toggle}">
          <input type="checkbox" id="marker-visible" checked>
          <i class="fas fa-location-dot"></i>
          <span th:text="#{marker.label}">Marker</span>
        </label>
        <div class="zoom-divider"></div>
        <button id="shortcut-btn" th:title="#{shortcut.btn}">
          <i class="fas fa-keyboard"></i>
        </button>
        <div id="shortcut-popup">
          <div class="sp-row">
            <span class="sp-keys"><kbd>1</kbd><span>–</span><kbd>5</kbd></span>
            <span class="sp-desc" th:text="#{shortcut.zoom}">Zoom 100–500%</span>
          </div>
          <div class="sp-row">
            <span class="sp-keys"><kbd>M</kbd></span>
            <span class="sp-desc" th:text="#{shortcut.marker}">Show / Hide markers</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 오른쪽 사이드바 ── -->
    <aside id="right-sidebar" aria-labelledby="오른쪽 사이드바"
      class="flex-shrink-0 bg-white flex flex-col"
      style="width:210px; display:none;">

      <!-- 헤더 -->
      <div id="rs-header" class="flex items-center gap-2 px-2 border-b border-gray-200 bg-gray-50 flex-shrink-0" style="height:40px;">
        <button id="rs-toggle"
          class="flex-shrink-0 w-7 h-7 flex items-center justify-center rounded hover:bg-gray-200 text-gray-500 hover:text-gray-800"
          th:title="#{sidebar.collapse}">
          <i id="rs-toggle-icon" class="fas fa-angles-right text-xs"></i>
        </button>
        <span id="rs-title" class="text-xs font-semibold text-gray-700 whitespace-nowrap flex-1" th:text="#{decal.list.title}">Decal List</span>
      </div>

      <!-- 펼쳤을 때: 검색 + 그리드 -->
      <div id="rs-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
        <!-- 검색 -->
        <div class="px-2 py-1.5 border-b border-gray-100 flex-shrink-0">
          <div class="flex items-center gap-1 bg-gray-100 rounded px-2 py-1">
            <i class="fas fa-magnifying-glass text-gray-400 text-xs"></i>
            <input id="decal-search" type="text" th:placeholder="#{decal.search.placeholder}" autocomplete="off" th:attr="aria-label=#{decal.search.aria}"
              class="flex-1 bg-transparent text-xs outline-none text-gray-700 placeholder-gray-400">
          </div>
        </div>
        <!-- 데칼 그리드 (5열) -->
        <div id="decal-list" class="flex-1 overflow-y-auto p-1.5">
          <span class="text-xs text-gray-400 p-1 block" th:text="#{manual.select}">Select a manual</span>
        </div>
      </div>

      <!-- 접었을 때: 1열 아이콘 목록 -->
      <div id="rs-icons" class="flex-1 flex-col items-center gap-0.5 py-1.5 overflow-y-auto" style="display:none;">
      </div>
    </aside>

  </div>
</div>

<div id="manual-item-tip"></div>
<script th:inline="javascript">
  window.i18n = {
    siteTitle:        /*[[#{site.title}]]*/ 'Gundam Manual',
    siteDescSuffix:   /*[[#{site.desc.suffix}]]*/ 'Gunpla Decal Manual',
    manualLoading:    /*[[#{manual.loading}]]*/ 'Loading…',
    manualSelect:     /*[[#{manual.select}]]*/ 'Select a manual',
    manualEmpty:      /*[[#{manual.empty}]]*/ 'No manuals registered',
    manualSearchEmpty:/*[[#{manual.search.empty}]]*/ 'No results found',
    manualLinkOpen:   /*[[#{manual.link.open}]]*/ 'Open link',
    manualPdfDownload:/*[[#{manual.pdf.download}]]*/ 'Download PDF',
    manualNotFound:   /*[[#{manual.notFound}]]*/ 'Manual not found',
    decalEmpty:       /*[[#{decal.empty}]]*/ 'No decals',
    decalSearchEmpty: /*[[#{decal.search.empty}]]*/ 'No results found',
    pdfLoading:       /*[[#{pdf.loading}]]*/ 'Loading…',
  };
</script>
<script th:src="@{/vendor/pretty-scroll/pretty-scroll.js}"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
