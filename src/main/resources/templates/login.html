<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="context-path" th:content="@{/}">
  <title>관리자 로그인</title>
  <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
  <script th:src="@{/vendor/tailwind/tailwind.min.js}"></script>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center">

<div class="w-full max-w-sm">
  <!-- 타이틀 -->
  <div class="text-center mb-8">
    <i class="fas fa-shield-halved text-4xl text-blue-400 mb-3"></i>
    <h1 class="text-xl font-bold text-white">관리자 로그인</h1>
    <p class="text-gray-400 text-sm mt-1">건담 메뉴얼 관리 시스템</p>
  </div>

  <!-- 에러 메시지 -->
  <div id="error-msg" class="hidden mb-4 px-4 py-3 bg-red-900/50 border border-red-700 rounded-lg text-sm text-red-300 flex items-center gap-2">
    <i class="fas fa-circle-exclamation flex-shrink-0"></i>
    <span id="error-text">로그인에 실패했습니다.</span>
  </div>
  <div th:if="${param.logout}" class="mb-4 px-4 py-3 bg-green-900/50 border border-green-700 rounded-lg text-sm text-green-300 flex items-center gap-2">
    <i class="fas fa-circle-check flex-shrink-0"></i>
    <span>로그아웃 되었습니다.</span>
  </div>

  <!-- 로그인 폼 -->
  <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
    <form id="login-form" th:action="@{/login}" method="post" autocomplete="off">
      <!-- 아이디 -->
      <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">아이디</label>
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="text" id="username" name="username" required autofocus
            class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-9 pr-3 py-2.5 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="아이디 입력">
        </div>
      </div>

      <!-- 비밀번호 -->
      <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">비밀번호</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="password" id="password" name="password" required
            class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-9 pr-3 py-2.5 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="비밀번호 입력">
        </div>
      </div>

      <!-- 캡챠 -->
      <div class="mb-6">
        <label for="captcha" class="block text-sm font-medium text-gray-300 mb-1.5">캡챠</label>
        <div class="flex gap-2">
          <input type="text" id="captcha" name="captcha" required
            class="flex-1 min-w-0 bg-gray-900 border border-gray-600 rounded-lg px-3 h-10 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent tracking-widest"
            placeholder="캡챠 코드 입력" maxlength="5" autocomplete="off"
            oninput="this.value=this.value.replace(/[^A-Za-z]/g,'').toUpperCase()">
          <div class="relative flex-shrink-0">
            <img id="captcha-img" th:src="@{/captcha}" alt="캡챠 이미지"
              class="h-10 rounded-lg border border-gray-600 cursor-pointer block"
              onclick="refreshCaptcha()">
            <div id="captcha-tooltip"
              class="absolute bottom-full left-1/2 -translate-x-1/2 mb-1.5 px-2 py-1 bg-black/80 text-white text-xs rounded whitespace-nowrap pointer-events-none"
              style="opacity:0; transition:opacity 0.15s;">
              클릭하면 새로고침
            </div>
          </div>
        </div>
      </div>

      <!-- 로그인 버튼 -->
      <button id="login-btn" type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
        <i class="fas fa-right-to-bracket"></i>
        로그인
      </button>
    </form>
  </div>
</div>

<script>
  const contextPath = (document.head.querySelector('meta[name="context-path"]')?.content ?? '/').replace(/\/$/, '');

  const ERROR_MESSAGES = {
    captcha: '캡챠 코드가 올바르지 않습니다.',
    credentials: '아이디 또는 비밀번호가 올바르지 않습니다.',
  };

  function refreshCaptcha() {
    document.getElementById('captcha-img').src = contextPath + '/captcha?' + Date.now();
    document.getElementById('captcha').value = '';
    document.getElementById('captcha').focus();
  }

  (function () {
    const img = document.getElementById('captcha-img');
    const tooltip = document.getElementById('captcha-tooltip');
    function showTooltip() {
      tooltip.style.opacity = '1';
    }

    function hideTooltip() {
      tooltip.style.opacity = '0';
    }

    img.addEventListener('mouseenter', showTooltip);
    img.addEventListener('mouseleave', hideTooltip);
  })();

  function showError(type) {
    document.getElementById('error-text').textContent = ERROR_MESSAGES[type] || '로그인에 실패했습니다.';
    document.getElementById('error-msg').classList.remove('hidden');
    refreshCaptcha();
  }

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    document.getElementById('error-msg').classList.add('hidden');

    const btn = document.getElementById('login-btn');
    btn.disabled = true;

    try {
      const response = await fetch(contextPath + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(this)),
      });
      if (response.ok) {
        window.location.replace(response.headers.get('Location') || contextPath + '/admin');
      } else {
        const data = await response.json();
        showError(data.error);
        btn.disabled = false;
      }
    } catch (_) {
      showError('');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
