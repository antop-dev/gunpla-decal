<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="context-path" th:content="@{/}">
  <title>건담 메뉴얼 – 관리자</title>
  <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
  <link rel="stylesheet" th:href="@{/vendor/tippy/tippy.css}">
  <script th:src="@{/vendor/tailwind/tailwind.min.js}"></script>
  <script th:src="@{/vendor/pdfjs/pdf.min.js}"></script>
  <script th:src="@{/vendor/tippy/popper.min.js}"></script>
  <script th:src="@{/vendor/tippy/tippy.min.js}"></script>
  <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="page-admin flex bg-gray-900">

<!-- ── 왼쪽 사이드바 ── -->
<aside id="sidebar" class="flex-shrink-0 bg-gray-900 text-white flex flex-col" style="width:220px;">

  <!-- 헤더 -->
  <div id="sb-header" class="flex items-center gap-2 px-2 bg-gray-800 border-b border-gray-700 flex-shrink-0" style="height:48px;">
    <button id="sb-toggle"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      title="접기">
      <i id="sb-toggle-icon" class="fas fa-angles-left text-sm"></i>
    </button>
    <span id="sb-title" class="font-bold text-sm whitespace-nowrap flex-1 truncate">건담 메뉴얼</span>
    <button id="sb-refresh"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-white"
      title="새로고침">
      <i class="fas fa-rotate-right text-xs"></i>
    </button>
    <form th:action="@{/logout}" method="post" style="display:contents;">
      <button type="submit" id="sb-logout"
        class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded hover:bg-gray-700 text-gray-400 hover:text-red-400"
        title="로그아웃">
        <i class="fas fa-right-from-bracket text-xs"></i>
      </button>
    </form>
  </div>

  <!-- 펼쳤을 때: 본문 -->
  <div id="sb-content" class="flex flex-col flex-1 min-h-0">
    <div class="px-2 py-1.5 border-b border-gray-500 flex-shrink-0 flex items-center gap-1.5">
      <div class="flex-1 flex items-center gap-1 bg-gray-700 rounded px-2 py-1">
        <i class="fas fa-magnifying-glass text-gray-500 text-xs"></i>
        <input id="manual-search" type="text" placeholder="등급 또는 제품명 검색…" autocomplete="off" aria-label="메뉴얼 검색"
          class="flex-1 bg-transparent text-xs outline-none text-gray-300 placeholder-gray-500">
      </div>
      <button id="btn-upload" title="메뉴얼 등록"
        class="flex-shrink-0 w-7 self-stretch bg-blue-600 hover:bg-blue-700 text-white rounded flex items-center justify-center">
        <i class="fas fa-plus text-xs"></i>
      </button>
    </div>
    <div id="manual-list" class="flex-1 overflow-y-auto p-1.5">
      <p class="text-gray-500 text-xs p-2">불러오는 중…</p>
    </div>
  </div>

  <!-- 접었을 때: 아이콘 목록 -->
  <div id="sb-icons" class="flex-1 flex-col items-center gap-0.5 overflow-y-auto" style="display:none;">
    <button id="btn-upload-icon"
      class="w-8 h-8 flex items-center justify-center rounded bg-blue-600 hover:bg-blue-700 text-white flex-shrink-0 my-1"
      title="메뉴얼 등록">
      <i class="fas fa-plus text-xs"></i>
    </button>
  </div>
</aside>

<!-- 메인 -->
<div class="flex-1 flex flex-col min-w-0">

  <!-- 썸네일 스트립 -->
  <div id="thumb-strip" class="flex-shrink-0 bg-gray-800 overflow-x-auto" style="height:85px; border-bottom:1px solid #6b7280;">
    <div class="strip-inner">
      <span class="text-gray-500 text-xs select-none">메뉴얼을 선택하세요</span>
    </div>
  </div>

  <!-- PDF 뷰어 -->
  <div id="pdf-container" class="flex-1 relative overflow-hidden bg-gray-700">
    <div id="no-pdf" class="absolute inset-0 flex items-center justify-center text-gray-300 select-none">
      <div class="text-center">
        <i class="fas fa-file-pdf text-5xl mb-3 opacity-50"></i>
        <p class="text-sm">메뉴얼을 선택하거나 등록하세요</p>
      </div>
    </div>
    <div id="pdf-loading"><div id="pdf-loading-page"></div></div>
    <div id="ch-h"></div>
    <div id="ch-v"></div>
    <div id="pdf-scroll" style="display:none;">
      <div id="pdf-sizer">
        <canvas id="pdf-canvas"></canvas>
        <div id="decal-overlay"></div>
      </div>
    </div>
    <div id="zoom-overlay">
      <button id="publish-btn" title="게시 상태 전환">
        <i id="publish-icon" class="fas fa-eye-slash"></i>
        <span>게시</span>
      </button>
      <button id="copy-link-btn" title="링크 복사">
        <i id="copy-link-icon" class="fas fa-link"></i>
      </button>
      <div class="zoom-divider"></div>
      <span id="zoom-label"></span>
      <input id="zoom-slider" type="range" min="10" max="500" step="1" value="100" aria-label="확대/축소">
      <button id="fit-width-btn" title="가로 맞춤">↔︎ 가로</button>
      <button id="fit-height-btn" title="세로 맞춤">↕︎ 세로</button>
      <div class="zoom-divider"></div>
      <label id="marker-toggle" title="마커 보이기/숨기기">
        <input type="checkbox" id="marker-visible" checked>
        <i class="fas fa-location-dot"></i>
        <span>마커</span>
      </label>
    </div>
    <div id="marker-tooltip">
      <button id="tt-edit"   title="번호 수정"><i class="fas fa-pen"></i></button>
      <button id="tt-delete" title="데칼 삭제"><i class="fas fa-trash"></i></button>
    </div>
  </div>
</div>

<!-- 메뉴얼 등록 모달 -->
<div id="upload-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-6">
    <div class="flex items-center gap-2 mb-4">
      <i class="fas fa-upload text-blue-600"></i>
      <h2 class="text-base font-bold">메뉴얼 등록</h2>
    </div>
    <form id="upload-form" class="space-y-3">
      <!-- 등급 + 형식번호 한 줄 -->
      <div class="flex gap-2 items-start">
        <div class="flex-shrink-0" style="width:88px;">
          <label for="inp-grade" class="block text-xs font-medium text-gray-700 mb-1">등급 *</label>
          <select id="inp-grade" required
            class="w-full border border-gray-300 rounded px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
            <option value="HG">HG</option>
            <option value="RG" selected>RG</option>
            <option value="MG">MG</option>
            <option value="PG">PG</option>
            <option value="ETC">기타</option>
          </select>
        </div>
        <div class="flex-1 min-w-0">
          <label for="inp-model" class="block text-xs font-medium text-gray-700 mb-1">형식번호</label>
          <input type="text" id="inp-model" autocomplete="off" aria-label="형식번호"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="예) RX-78-2">
        </div>
      </div>
      <!-- 제품명 -->
      <div>
        <label for="inp-name" class="block text-xs font-medium text-gray-700 mb-1">제품명 *</label>
        <div class="flex gap-1.5">
          <input type="text" id="inp-name" required autocomplete="off"
            class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="예) 1/144 RX-78-2 건담">
          <button type="button" title="소문자를 대문자로 변환"
            onclick="const i=document.getElementById('inp-name');i.value=i.value.toUpperCase();i.focus();"
            class="flex-shrink-0 px-2.5 border border-gray-300 rounded text-gray-500 hover:bg-gray-50 hover:text-gray-700">
            <i class="fas fa-a text-xs"></i>
          </button>
        </div>
      </div>
      <!-- 링크 -->
      <div>
        <label for="inp-link" class="block text-xs font-medium text-gray-700 mb-1">링크</label>
        <input type="text" id="inp-link" autocomplete="off"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          placeholder="https://...">
      </div>
      <!-- PDF -->
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">PDF *</label>
        <div class="flex rounded border border-gray-200 overflow-hidden text-xs mb-2">
          <button type="button" id="pdf-tab-url"
            class="flex-1 py-1.5 font-medium bg-blue-600 text-white">URL 입력</button>
          <button type="button" id="pdf-tab-file"
            class="flex-1 py-1.5 font-medium bg-gray-100 text-gray-600 hover:bg-gray-50">파일 업로드</button>
        </div>
        <!-- 파일 업로드 영역 -->
        <div id="pdf-file-area">
          <div id="drop-zone"
            class="rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 transition-colors cursor-pointer">
            <input type="file" id="file-input" accept=".pdf" class="hidden">
            <div id="drop-placeholder" class="flex flex-col items-center justify-center py-5 px-4 text-center">
              <i class="fas fa-cloud-upload-alt text-2xl text-gray-300 mb-1.5"></i>
              <p class="text-xs text-gray-400">PDF 파일을 드래그하거나 클릭하세요</p>
            </div>
            <div id="drop-file-info" class="hidden items-center gap-2 px-3 py-3">
              <i class="fas fa-file-pdf text-red-500 flex-shrink-0"></i>
              <span id="drop-filename" class="text-xs text-gray-700 flex-1 truncate min-w-0"></span>
              <span id="drop-filesize" class="text-xs text-gray-400 flex-shrink-0"></span>
              <button type="button" id="drop-remove"
                class="flex-shrink-0 w-5 h-5 flex items-center justify-center text-gray-400 hover:text-red-500 rounded">
                <i class="fas fa-xmark text-xs"></i>
              </button>
            </div>
          </div>
        </div>
        <!-- URL 입력 영역 -->
        <div id="pdf-url-area" class="hidden">
          <input type="text" id="inp-pdf-url" autocomplete="off"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="https://.../manual.pdf">
        </div>
      </div>
      <!-- 버튼 -->
      <div class="flex justify-end gap-2 pt-1">
        <button type="button" id="btn-upload-cancel"
          class="px-4 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50 flex items-center gap-1.5">
          <i class="fas fa-xmark text-xs"></i> 취소
        </button>
        <button type="submit" id="btn-submit"
          class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1.5 min-w-20 justify-center">
          <i class="fas fa-upload text-xs"></i> 등록
        </button>
      </div>
    </form>
  </div>
</div>

<!-- 데칼 번호 입력 팝업 (클릭 위치 근처에 표시) -->
<div id="decal-modal" class="hidden" style="position:fixed; z-index:50;">
  <div id="decal-modal-card" class="bg-white rounded-lg border border-gray-200" style="width:220px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,0.18); transition:box-shadow 0.24s ease;">
    <div class="flex items-center mb-3">
      <i class="fas fa-circle-dot text-blue-500 mr-1.5 text-xs flex-shrink-0"></i>
      <h2 class="text-xs font-bold text-gray-700 flex-1">데칼 번호 입력</h2>
      <button type="button" id="btn-decal-close"
        class="w-5 h-5 flex items-center justify-center text-gray-400 hover:text-gray-700 rounded">
        <i class="fas fa-xmark text-xs"></i>
      </button>
    </div>
    <div class="grid gap-y-2" style="grid-template-columns:2rem 1fr; align-items:center; margin-bottom:10px;">
      <span class="text-xs text-gray-600">색상</span>
      <div class="flex items-center gap-1">
        <div class="flex items-center border border-gray-300 rounded overflow-hidden flex-shrink-0" style="width:76px;height:22px;">
          <span class="text-xs text-gray-400 px-1 bg-gray-50 border-r border-gray-200 select-none leading-none">#</span>
          <input type="text" id="inp-decal-hex" maxlength="6" autocomplete="off" spellcheck="false"
            class="text-xs font-mono uppercase px-1 outline-none flex-1 h-full min-w-0" placeholder="FFFFFF">
        </div>
        <button type="button" id="btn-wb-decal" title="흰색/검정 전환"
          class="flex-shrink-0 rounded border border-gray-400 overflow-hidden"
          style="width:22px;height:22px;background:linear-gradient(to right, #ffffff 50%, #000000 50%);"></button>
        <button type="button" id="wrap-decal-color" class="flex-shrink-0 rounded border border-gray-300 flex items-center justify-center"
          style="width:22px;height:22px;background:#ffffff;" title="색상 선택">
          <i class="fas fa-palette text-xs" id="ico-decal-palette" style="color:#333;pointer-events:none;"></i>
        </button>
        <button type="button" id="btn-ai-color-decal" title="AI로 색상 찾기"
          class="flex-shrink-0 rounded border border-gray-300 flex items-center justify-center hover:bg-gray-50"
          th:classAppend="${!hasAi} ? 'hidden'"
          style="width:22px;height:22px;">
          <i class="fas fa-robot text-xs text-gray-600" style="pointer-events:none;"></i>
        </button>
        <input type="color" id="inp-decal-color" value="#ffffff" class="hidden">
      </div>
      <span class="text-xs text-gray-600">모양</span>
      <div class="flex items-center gap-2">
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="decal-shape" id="inp-decal-shape-circle" value="CIRCLE" checked class="sr-only">
          <span class="shape-toggle shape-circle flex items-center justify-center border-2 border-gray-400 rounded-full" style="width:22px;height:22px;">
            <i class="fas fa-check shape-check"></i>
          </span>
        </label>
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="decal-shape" id="inp-decal-shape-square" value="SQUARE" class="sr-only">
          <span class="shape-toggle flex items-center justify-center border-2 border-gray-400" style="width:21px;height:21px;">
            <i class="fas fa-check shape-check"></i>
          </span>
        </label>
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="decal-shape" id="inp-decal-shape-diamond" value="DIAMOND" class="sr-only">
          <span class="shape-toggle flex items-center justify-center border-2 border-gray-400" style="width:16px;height:16px;transform:rotate(45deg);">
            <i class="fas fa-check shape-check" style="transform:rotate(-45deg);"></i>
          </span>
        </label>
      </div>
      <span class="text-xs text-gray-600">번호</span>
      <div class="flex gap-1">
        <input type="text" id="inp-decal-num" placeholder="예) 1, A, ア" autocomplete="off" aria-label="데칼 번호"
          class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-shrink-0" style="width:56px;">
        <button type="button" id="btn-jp-decal" title="일본어 선택"
          class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 flex-shrink-0 text-gray-600">あ</button>
        <span id="onnx-loading" class="hidden flex items-center px-1 text-blue-400" title="번호 인식 중...">
          <i class="fas fa-spinner fa-spin text-xs"></i>
        </span>
        <button type="button" id="btn-ai-decal" title="AI로 찾기"
          class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 flex-shrink-0 text-gray-600"
          th:classAppend="${!hasAi} ? 'hidden'">
          <i class="fas fa-robot text-xs"></i>
        </button>
      </div>
    </div>
    <div class="flex justify-end gap-1.5">
      <button id="btn-decal-cancel" class="px-2.5 py-1 text-xs border border-gray-300 rounded hover:bg-gray-50 flex items-center gap-1">
        <i class="fas fa-xmark text-xs"></i> 취소
      </button>
      <button id="btn-decal-ok" class="px-2.5 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1">
        <i class="fas fa-check text-xs"></i> 저장
      </button>
    </div>
  </div>
</div>

<!-- 데칼 번호 수정 팝업 (클릭 위치 근처에 표시) -->
<div id="edit-modal" class="hidden" style="position:fixed; z-index:50;">
  <div class="bg-white rounded-lg border border-gray-200" style="width:220px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,0.18);">
    <div class="flex items-center mb-3">
      <i class="fas fa-pen text-blue-500 mr-1.5 text-xs flex-shrink-0"></i>
      <h2 class="text-xs font-bold text-gray-700 flex-1">데칼 번호 수정</h2>
      <button type="button" id="btn-edit-close"
        class="w-5 h-5 flex items-center justify-center text-gray-400 hover:text-gray-700 rounded">
        <i class="fas fa-xmark text-xs"></i>
      </button>
    </div>
    <div class="grid gap-y-2" style="grid-template-columns:2rem 1fr; align-items:center; margin-bottom:10px;">
      <span class="text-xs text-gray-600">색상</span>
      <div class="flex items-center gap-1">
        <div class="flex items-center border border-gray-300 rounded overflow-hidden flex-shrink-0" style="width:76px;height:22px;">
          <span class="text-xs text-gray-400 px-1 bg-gray-50 border-r border-gray-200 select-none leading-none">#</span>
          <input type="text" id="inp-edit-hex" maxlength="6" autocomplete="off" spellcheck="false"
            class="text-xs font-mono uppercase px-1 outline-none flex-1 h-full min-w-0" placeholder="FFFFFF">
        </div>
        <button type="button" id="btn-wb-edit" title="흰색/검정 전환"
          class="flex-shrink-0 rounded border border-gray-400 overflow-hidden"
          style="width:22px;height:22px;background:linear-gradient(to right, #ffffff 50%, #000000 50%);"></button>
        <button type="button" id="wrap-edit-color" class="flex-shrink-0 rounded border border-gray-300 flex items-center justify-center"
          style="width:22px;height:22px;background:#ffffff;" title="색상 선택">
          <i class="fas fa-palette text-xs" id="ico-edit-palette" style="color:#333;pointer-events:none;"></i>
        </button>
        <button type="button" id="btn-ai-color-edit" title="AI로 색상 찾기"
          class="flex-shrink-0 rounded border border-gray-300 flex items-center justify-center hover:bg-gray-50"
          th:classAppend="${!hasAi} ? 'hidden'"
          style="width:22px;height:22px;">
          <i class="fas fa-robot text-xs text-gray-600" style="pointer-events:none;"></i>
        </button>
        <input type="color" id="inp-edit-color" value="#ffffff" class="hidden">
      </div>
      <span class="text-xs text-gray-600">모양</span>
      <div class="flex items-center gap-2">
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="edit-shape" id="inp-edit-shape-circle" value="CIRCLE" checked class="sr-only">
          <span class="shape-toggle shape-circle flex items-center justify-center border-2 border-gray-400 rounded-full" style="width:22px;height:22px;">
            <i class="fas fa-check shape-check"></i>
          </span>
        </label>
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="edit-shape" id="inp-edit-shape-square" value="SQUARE" class="sr-only">
          <span class="shape-toggle flex items-center justify-center border-2 border-gray-400" style="width:21px;height:21px;">
            <i class="fas fa-check shape-check"></i>
          </span>
        </label>
        <label class="cursor-pointer flex-shrink-0">
          <input type="radio" name="edit-shape" id="inp-edit-shape-diamond" value="DIAMOND" class="sr-only">
          <span class="shape-toggle flex items-center justify-center border-2 border-gray-400" style="width:16px;height:16px;transform:rotate(45deg);">
            <i class="fas fa-check shape-check" style="transform:rotate(-45deg);"></i>
          </span>
        </label>
      </div>
      <span class="text-xs text-gray-600">번호</span>
      <div class="flex gap-1">
        <input type="text" id="inp-edit-num" autocomplete="off" placeholder="예) 1, A, ア" aria-label="데칼 번호"
          class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-shrink-0" style="width:56px;">
        <button type="button" id="btn-jp-edit" title="일본어 선택"
          class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 flex-shrink-0 text-gray-600">あ</button>
        <button type="button" id="btn-ai-edit" title="AI로 찾기"
          class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 flex-shrink-0 text-gray-600"
          th:classAppend="${!hasAi} ? 'hidden'">
          <i class="fas fa-robot text-xs"></i>
        </button>
      </div>
    </div>
    <div class="flex justify-end gap-1.5">
      <button id="btn-edit-delete" class="w-6 h-6 text-xs bg-red-500 text-white rounded hover:bg-red-600 flex items-center justify-center mr-auto">
        <i class="fas fa-trash text-xs"></i>
      </button>
      <button id="btn-edit-cancel" class="px-2.5 py-1 text-xs border border-gray-300 rounded hover:bg-gray-50 flex items-center gap-1">
        <i class="fas fa-xmark text-xs"></i> 취소
      </button>
      <button id="btn-edit-ok" class="px-2.5 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1">
        <i class="fas fa-check text-xs"></i> 저장
      </button>
    </div>
  </div>
</div>

<!-- 일본어 문자 선택 팝업 (등록/수정 모달에서 공유) -->
<div id="jp-picker" class="hidden" style="position:fixed; z-index:60;">
  <div class="bg-white rounded-lg border border-gray-200" style="width:240px; padding:8px; box-shadow:0 8px 24px rgba(0,0,0,0.22);">
    <div class="flex items-center mb-2">
      <span class="text-xs font-bold text-gray-700 flex-1">일본어 선택</span>
      <button type="button" id="btn-jp-close"
        class="w-5 h-5 flex items-center justify-center text-gray-400 hover:text-gray-700 rounded">
        <i class="fas fa-xmark text-xs"></i>
      </button>
    </div>
    <div id="jp-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:3px; max-height:248px; overflow-y:auto;"></div>
  </div>
</div>

<!-- 커스텀 색상 선택기 팝업 -->
<div id="cp-popup" class="hidden" style="position:fixed; z-index:70;">
  <div class="bg-white rounded-lg border border-gray-200" style="padding:10px; box-shadow:0 8px 24px rgba(0,0,0,0.22);">
    <canvas id="cp-sv" width="170" height="130" class="block rounded cursor-crosshair" style="width:170px;height:130px;margin-bottom:8px;"></canvas>
    <canvas id="cp-hue" width="170" height="14" class="block cursor-pointer" style="width:170px;height:14px;border-radius:7px;"></canvas>
  </div>
</div>

<!-- 메뉴얼 수정 모달 -->
<div id="manual-edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-6">
    <div class="flex items-center gap-2 mb-4">
      <i class="fas fa-pen text-blue-600"></i>
      <h2 class="text-base font-bold">메뉴얼 수정</h2>
    </div>
    <form id="manual-edit-form" class="space-y-3">
      <!-- 등급 + 형식번호 한 줄 -->
      <div class="flex gap-2 items-start">
        <div class="flex-shrink-0" style="width:88px;">
          <label for="edit-inp-grade" class="block text-xs font-medium text-gray-700 mb-1">등급 *</label>
          <select id="edit-inp-grade" required
            class="w-full border border-gray-300 rounded px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
            <option value="HG">HG</option>
            <option value="RG">RG</option>
            <option value="MG">MG</option>
            <option value="PG">PG</option>
            <option value="ETC">기타</option>
          </select>
        </div>
        <div class="flex-1 min-w-0">
          <label for="edit-inp-model" class="block text-xs font-medium text-gray-700 mb-1">형식번호</label>
          <input type="text" id="edit-inp-model" autocomplete="off" aria-label="형식번호"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="예) RX-78-2">
        </div>
      </div>
      <!-- 제품명 -->
      <div>
        <label for="edit-inp-name" class="block text-xs font-medium text-gray-700 mb-1">제품명 *</label>
        <div class="flex gap-1.5">
          <input type="text" id="edit-inp-name" required autocomplete="off"
            class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="예) 1/144 RX-78-2 건담">
          <button type="button" title="소문자를 대문자로 변환"
            onclick="const i=document.getElementById('edit-inp-name');i.value=i.value.toUpperCase();i.focus();"
            class="flex-shrink-0 px-2.5 border border-gray-300 rounded text-gray-500 hover:bg-gray-50 hover:text-gray-700">
            <i class="fas fa-a text-xs"></i>
          </button>
        </div>
      </div>
      <!-- 링크 -->
      <div>
        <label for="edit-inp-link" class="block text-xs font-medium text-gray-700 mb-1">링크</label>
        <input type="text" id="edit-inp-link" autocomplete="off"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          placeholder="https://...">
      </div>
      <!-- 버튼 -->
      <div class="flex justify-end gap-2 pt-1">
        <button type="button" id="btn-manual-edit-cancel"
          class="px-4 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50 flex items-center gap-1.5">
          <i class="fas fa-xmark text-xs"></i> 취소
        </button>
        <button type="submit" id="btn-manual-edit-submit"
          class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1.5 min-w-20 justify-center">
          <i class="fas fa-check text-xs"></i> 저장
        </button>
      </div>
    </form>
  </div>
</div>

<!-- AI 인식 결과 툴팁 -->
<div id="ai-tip" class="hidden" style="position:fixed; z-index:90;">
  <div id="ai-tip-inner" class="text-xs rounded px-2 py-1.5 border shadow-md"></div>
</div>

<script th:src="@{/vendor/pretty-scroll/pretty-scroll.js}"></script>
<script th:src="@{/js/common.js}"></script>
<script th:inline="javascript">window.onnxAvailable = /*[[${hasOnnx}]]*/ false;</script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
