spring:
  devtools:
    livereload:
      enabled: true
    remote:
      restart:
        enabled: true
  thymeleaf:
    cache: false

decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      multiline: true
      log-format: "%(executionTime) ms | %(sql)"

logging:
  level:
    p6spy: debug
