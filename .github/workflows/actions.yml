name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # PR: 컴파일 오류만 빠르게 확인
      - name: Compile check (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew compileKotlin

      # push: 배포용 JAR 빌드
      - name: Build JAR (push)
        if: github.event_name == 'push'
        run: ./gradlew bootJar

      - name: Rename to app.jar
        if: github.event_name == 'push'
        run: mv build/libs/gunpla-decal-*.jar build/libs/app.jar

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/app.jar
          retention-days: 1

      - name: Notify Slack (PR success)
        if: success() && github.event_name == 'pull_request'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"✅ PR 빌드 성공"}'

      - name: Notify Slack (PR failure)
        if: failure() && github.event_name == 'pull_request'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"❌ PR 빌드 실패"}'

      # deploy job 은 실행되지 않으므로 여기서 처리
      - name: Notify Slack (build failed)
        if: failure() && github.event_name == 'push'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"❌ 배포 실패 (빌드 오류)"}'

  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: app.jar
          target: ${{ secrets.SSH_DEPLOY_DIR }}
          overwrite: true

      - name: Restart application
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ secrets.SSH_DEPLOY_DIR }}
          DB_PATH:    ${{ secrets.APP_DB_PATH }}
          UPLOAD_DIR: ${{ secrets.APP_UPLOAD_DIR }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: DEPLOY_DIR,DB_PATH,UPLOAD_DIR
          script: |
            PID_FILE="$DEPLOY_DIR/app.pid"

            # 기존 프로세스 종료
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "Stopping PID $OLD_PID ..."
                kill "$OLD_PID"
                sleep 3
              fi
              rm -f "$PID_FILE"
            fi

            # 새 프로세스 시작 (env var 은 nohup 자식 프로세스에 자동 상속됨)
            nohup java -jar "$DEPLOY_DIR/app.jar" \
              > "$DEPLOY_DIR/app.log" 2>&1 &

            echo $! > "$PID_FILE"
            echo "Started PID $(cat "$PID_FILE")"

      - name: Notify Slack (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"✅ 배포 성공"}'

      - name: Notify Slack (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"❌ 배포 실패"}'
